worker_processes auto;
pid /tmp/nginx.pid;
worker_rlimit_nofile 8192;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    types_hash_max_size 2048;

    server_tokens off;
    access_log off;
    error_log /dev/stderr warn;

    server {
        listen 3000 default_server;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # CRITICAL: Never cache index.html
        location = /index.html {
            expires -1;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        # Block source maps from being publicly accessible
        location ~* \.map$ {
            deny all;
            access_log off;
            log_not_found off;
        }

        # Static assets with content hash - cache aggressively
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|avif|woff2?|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # Health check
        location /health {
            access_log off;
            return 200 "healthy\n";
            default_type text/plain;
        }

        # Block hidden files
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        # SPA routing - this already handles all unmatched routes
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}