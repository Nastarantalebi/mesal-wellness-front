variables:
  IMAGE_BASE: "artifacts.repo.mesal.ir/docker-hosted/wellness"

workflow:
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: always
    - if: '$CI_COMMIT_MESSAGE =~ /\[deploy\]/i'
      when: always
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: always
    - when: never

stages:
  - build
  - security-scan   
  - deploy  

include:
  # Production Build
  - project: 'devops/ci-templates'
    file: '/docker/build-and-push.yml'
    inputs:
      environment: "production"
      target_image: "${IMAGE_BASE}/wn-front:latest"
      stage_name: "build"


  # Production Security Scan
  - project: 'devops/ci-templates'
    file: '/security/security-scan.yml'
    inputs:
      target_image: "${IMAGE_BASE}/wn-front:latest"
      stage_name: "security-scan"
      db_repository: "artifacts.repo.mesal.ir/docker-proxy/aquasec/trivy-db:latest"


  # Production Deploy 
  - project: 'devops/ci-templates'
    file: '/deploy/ssh-deploy.yml'
    inputs:
      environment: "production"
      deploy_script: "deploy/production.sh"  
      image_to_deploy: "$IMAGE_BASE/wn-front:latest"
      stage_name: "deploy"
      needs_jobs: ["build-for-production"]





  # Development Build
  - project: 'devops/ci-templates'
    file: '/docker/build-and-push.yml'
    inputs:
      environment: "development"
      target_image: "${IMAGE_BASE}/wn-dev-front:latest"
      stage_name: "build"
      build_args: '--build-arg MODE=development'
      trigger_type: "manual"


  # Development Security Scan
  - project: 'devops/ci-templates'
    file: '/security/security-scan.yml'
    inputs:
      environment: "development"
      target_image: "${IMAGE_BASE}/wn-dev-front:latest"
      stage_name: "security-scan"
      db_repository: "artifacts.repo.mesal.ir/docker-proxy/aquasec/trivy-db:latest"


  # Development Deploy 
  - project: 'devops/ci-templates'
    file: '/deploy/ssh-deploy.yml'
    inputs:
      environment: "development"
      deploy_script: "deploy/development.sh"  
      image_to_deploy: "$IMAGE_BASE/wn-dev-front:latest"
      stage_name: "deploy"
      trigger_type: "auto"
      needs_jobs: ["build-for-development"]

trivy-scan-for-development:
  needs: ["build-for-development"]
