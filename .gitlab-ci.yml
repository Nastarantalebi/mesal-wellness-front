# Define YAML anchors for all common values
.common-build: &common-build
  namespace: "wellness"
  nexus_url: "artifacts.repo.mesal.ir"
  nexus_repo: "docker-hosted"
  image_tag: "latest"
  stage_name: "build"

.common-deploy: &common-deploy
  ssh_port: 2223  # Number - preserved
  stage_name: "deploy"

.production: &production
  environment: "production"

.development: &development
  environment: "development"

.nexus-base: &nexus-base
  nexus_url: "artifacts.repo.mesal.ir"
  nexus_repo: "docker-hosted"

workflow:
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: always
    - if: '$CI_COMMIT_MESSAGE =~ /\[deploy\]/i'
      when: always
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: always
    - when: never

stages:
  - build   
  - deploy  

include:
  # Production Build
  - project: 'devops/ci-templates'
    file: '/docker/build-and-push.yml'
    inputs:
      <<: *common-build
      image_name: "wn-front"

  # Production Deploy
  - project: 'devops/ci-templates'
    file: '/deploy/ssh-deploy.yml'
    inputs:
      <<: [*common-deploy, *production]
      deploy_command: "/home/production/server_deploy/repos/wellness/deploy-front.sh"
      image_to_deploy: "artifacts.repo.mesal.ir/docker-hosted/wellness/wn-front:latest"
      needs_job: "build-for-production"

  # Development Build
  - project: 'devops/ci-templates'
    file: '/docker/build-and-push.yml'
    inputs:
      <<: *common-build
      environment: "development"
      image_name: "wn-dev-front"
      build_args: '--build-arg MODE=development'
      trigger_type: "manual"

  # Development Deploy
  - project: 'devops/ci-templates'
    file: '/deploy/ssh-deploy.yml'
    inputs:
      <<: [*common-deploy, *development]
      deploy_command: "/home/production/server_deploy/repos/wellness-dev/deploy-front.sh"
      image_to_deploy: "artifacts.repo.mesal.ir/docker-hosted/wellness/wn-dev-front:latest"
      trigger_type: "auto"
      needs_job: "build-for-development"