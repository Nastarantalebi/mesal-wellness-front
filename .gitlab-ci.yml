variables:
  IMAGE_BASE: "artifacts.repo.mesal.ir/docker-hosted/wellness"

workflow:
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: always
    - if: '$CI_COMMIT_MESSAGE =~ /\[deploy\]/i'
      when: always
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: always
    - when: never

stages:
  - build   
  - deploy  

include:
  # Production Build
  - project: 'devops/ci-templates'
    file: '/docker/build-and-push.yml'
    inputs:
      environment: "production"
      target_image: "${IMAGE_BASE}/wn-front:latest"
      stage_name: "build"

  # Production Deploy
  - project: 'devops/ci-templates'
    file: '/deploy/ssh-deploy.yml'
    inputs:
      environment: "production"
      ssh_port: 2223
      deploy_command: "/home/production/server_deploy/repos/wellness/deploy-front.sh"
      image_to_deploy: "${IMAGE_BASE}/wn-front:latest"
      stage_name: "deploy"
      needs_job: "build-for-production"

  # Development Build
  - project: 'devops/ci-templates'
    file: '/docker/build-and-push.yml'
    inputs:
      environment: "development"
      target_image: "${IMAGE_BASE}/wn-dev-front:latest"
      stage_name: "build"
      build_args: '--build-arg MODE=development'
      trigger_type: "manual"

  # Development Deploy
  - project: 'devops/ci-templates'
    file: '/deploy/ssh-deploy.yml'
    inputs:
      environment: "development"
      ssh_port: 2223
      deploy_command: "/home/production/server_deploy/repos/wellness-dev/deploy-front.sh"
      image_to_deploy: "${IMAGE_BASE}/wn-dev-front:latest"
      stage_name: "deploy"
      trigger_type: "auto"
      needs_job: "build-for-development"